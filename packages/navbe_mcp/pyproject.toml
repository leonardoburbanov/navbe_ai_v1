[project]
name = "navbe-mcp"
version = "0.1.0"
description = "FastMCP tool wiring and registry"
requires-python = ">=3.12"
dependencies = [
    "navbe-connectors",
    "navbe-core",
    "navbe-destinations",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navbe_mcp"]
