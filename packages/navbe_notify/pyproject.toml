[project]
name = "navbe-notify"
version = "0.1.0"
description = "Pub/sub event bus (in-memory stub; SQLite in Sprint 1)"
requires-python = ">=3.12"
dependencies = [
    "navbe-core",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navbe_notify"]
