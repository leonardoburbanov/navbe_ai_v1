[project]
name = "navbe-core"
version = "0.1.0"
description = "Workflow IR, LangGraph compile, run store, secrets"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=44.0",
    "duckdb>=1.5",
    "langgraph>=0.2",
    "navbe-connectors",
    "navbe-destinations",
    "navbe-notify",
    "navbe-scheduler",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navbe_core"]
