[project]
name = "navbe-transforms"
version = "0.1.0"
description = "Reusable transform steps (tag parse, aggregate)"
requires-python = ">=3.12"
dependencies = [
    "navbe-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navbe_transforms"]
