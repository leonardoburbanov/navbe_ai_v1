[project]
name = "navbe-api"
version = "0.1.0"
description = "FastAPI REST + SSE + MCP mount for the Navbe daemon"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.137",
    "fastmcp>=3.4",
    "navbe-connectors",
    "navbe-core",
    "navbe-destinations",
    "navbe-mcp",
    "navbe-notify",
    "navbe-scheduler",
    "pydantic>=2.0",
    "uvicorn[standard]>=0.49",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navbe_api"]
