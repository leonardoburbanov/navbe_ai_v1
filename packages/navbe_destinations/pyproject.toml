[project]
name = "navbe-destinations"
version = "0.1.0"
description = "Destination plugins (DuckDB / CSV)"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navbe_destinations"]
